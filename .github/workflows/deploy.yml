name: Deploy to GitHub Pages

# main 브랜치에 push되면 자동 배포 (수동 실행도 가능)
on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 권한 (Pages 배포에 필요)
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 실행 방지 — 진행 중인 배포가 있으면 새 배포는 큐잉
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 저장소 루트 전체를 그대로 배포 (정적 HTML)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
